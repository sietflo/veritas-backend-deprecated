<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тест нашого ШІ-Бекенду 🚀</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #121212; color: #fff;">

    <h2>AI Coach Backend Test Stand 🧪</h2>

    <form id="testForm" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display:block; margin-bottom:5px;"><b>1. Текст вакансії:</b></label>
            <textarea id="job" rows="6" style="width:100%; background:#222; color:#fff; border:1px solid #444; padding:8px;" required>We need a Python developer with experience in FastAPI, PostgreSQL, and Machine Learning. Must know scikit-learn and Docker. Experience with AWS is a plus.</textarea>
        </div>

        <div>
            <label style="display:block; margin-bottom:5px;"><b>2. Резюме (Тільки PDF):</b></label>
            <input type="file" id="cv" accept=".pdf" required style="color:#fff;">
        </div>

        <button type="submit" id="btn" style="padding:12px; background:#0070f3; color:#fff; border:none; cursor:pointer; font-weight:bold; font-size:16px;">
            Запустити ML + ШІ аналіз
        </button>
    </form>

    <div id="loading" style="display:none; color:#ffd700; margin-top:20px; font-weight:bold; font-size:18px;">
        ⏳ Сервер рахує TF-IDF та генерує токени в Gemini... Зачекай 3-5 секунд...
    </div>

    <div id="result" style="display:none; margin-top:30px; background:#1e1e1e; padding:15px; border-left:5px solid #0070f3;">
        <h3>📊 Результат з Render:</h3>
        <p><b>Статус:</b> <span id="resStatus" style="color:#00ff00;"></span></p>
        <p style="font-size:20px;"><b>ATS Score:</b> <span id="resScore" style="color:#ffd700; font-weight:bold;"></span></p>
        <p><b>Missing Skills:</b> <span id="resSkills"></span></p><hr style="border-color: #333; margin: 20px 0;">

        <p style="font-size: 18px; color: #0070f3;"><b>🤖 Головний вердикт ШІ:</b></p>
        <div id="resVerdict" style="background:#2d2d2d; padding:15px; border-radius: 5px; margin-bottom: 20px;"></div>

        <p style="font-size: 16px; color: #4CAF50;"><b>💪 Сильні сторони:</b></p>
        <ul id="resStrengths" style="margin-bottom: 20px; color: #e0e0e0;"></ul>

        <p style="font-size: 16px; color: #ff9800;"><b>🛠️ Що і як покращити:</b></p>
        <div id="resImprovements" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            
            // Вмикаємо лоадер
            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            // Збираємо дані з полів
            const jobText = document.getElementById('job').value;
            const cvFile = document.getElementById('cv').files[0];

            // Пакуємо в FormData під FastAPI
            const formData = new FormData();
            formData.append('job_description', jobText);
            formData.append('cv_file', cvFile);

            try {
                // Запит на Render
                const response = await fetch('https://ats-hzsq.onrender.com/api/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                console.log("Повна відповідь сервера:", data);

                if (data.status === 'success') {
                    document.getElementById('resStatus').innerText = data.status;
                    document.getElementById('resScore').innerText = data.results.ats_score + '%';
                    document.getElementById('resSkills').innerText = data.results.missing_skills.join(', ') || 'Немає';
                    document.getElementById('resVerdict').innerText = data.results.ai_coaching.verdict;
                    const strengthsList = document.getElementById('resStrengths');
                    strengthsList.innerHTML = ''; // Очищаємо список перед заповненням
                    if (data.results.ai_coaching.strengths && data.results.ai_coaching.strengths.length > 0) {
                        data.results.ai_coaching.strengths.forEach(item => {
                            const li = document.createElement('li');
                            li.innerText = item;
                            strengthsList.appendChild(li);
                        });
                    } else {
                        strengthsList.innerHTML = '<li>ШІ не знайшов явних сильних сторін</li>';
                    }

                    // ЗБИРАЄМО ПОКРАЩЕННЯ (Масив об'єктів)
                    const improvementsContainer = document.getElementById('resImprovements');
                    improvementsContainer.innerHTML = ''; // Очищаємо контейнер
                    
                    if (data.results.ai_coaching.improvements && data.results.ai_coaching.improvements.length > 0) {
                        data.results.ai_coaching.improvements.forEach(imp => {
                            // Створюємо картку для кожного об'єкта
                            const card = document.createElement('div');
                            card.style.cssText = "background: #2a2a2a; border-left: 4px solid #ff9800; padding: 15px; border-radius: 4px;";
                            
                            // Заповнюємо картку даними з JSON
                            card.innerHTML = `
                                <div style="font-size: 12px; color: #ff9800; text-transform: uppercase; margin-bottom: 8px; font-weight: bold;">
                                    📌 Розділ: ${imp.section}
                                </div>
                                <div style="margin-bottom: 8px;">
                                    ❌ <b>Було:</b> <span style="color: #ff6b6b;">"${imp.original_text}"</span>
                                </div>
                                <div style="margin-bottom: 8px;">
                                    ✅ <b>Запропоновано:</b> <span style="color: #4CAF50;">"${imp.suggested_text}"</span>
                                </div>
                                <div style="font-size: 14px; color: #aaa; background: #1a1a1a; padding: 8px; border-radius: 4px;">
                                    💡 <b>Чому:</b> ${imp.reason}
                                </div>
                            `;
                            improvementsContainer.appendChild(card);
                        });
                    } else {
                        improvementsContainer.innerHTML = '<div>Немає критичних зауважень щодо тексту.</div>';
                    }
                    resultDiv.style.display = 'block';
                } else {
                    alert('Помилка сервера: ' + data.message);
                }
            } catch (error) {
                console.error(error);
                alert('Не вдалося зв\'язатися з сервером. Перевір логи на Render або CORS!');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
